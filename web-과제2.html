<html>
    <head>
        <title> web study 과제</title>
    </head>
    <body>
        <table border="1">
        <form method="post" name="form">
            
            <tr>
                <td>이름</td>
                <td><input type="text" name="iname" /></td> 
            </tr>

            <tr>
                <td>아이디</td>
                <td><input type="text" name="id" /></td> 
            </tr>

            <tr>
                <td>성별</td>
                <td><input type="radio" name="gender" value="남" /> 남
                <input type="radio" name="gender" value="여" /> 여</td> 
            </tr>

            <tr>
                <td>나이</td>
                <td>
                    <input type="checkbox" name="icheckbox" value="checkbox1" /> 20
                    <input type="checkbox" name="icheckbox" value="checkbox2" /> 21
                    <input type="checkbox" name="icheckbox" value="checkbox3" /> 22 <br>
                    <input type="checkbox" name="icheckbox" value="checkbox4" /> 23
                    <input type="checkbox" name="icheckbox" value="checkbox5" /> 24 
                </td>
            </tr>

            
            <tr>
                <td>생일</td>
                <td>
                    <select name = "iselect">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align = "center" colspan = "2">자기소개서</td>
            </tr>

            <tr>
                <td colspan = "2">
                    <textarea name="itextarea" cols="50" rows="20">400자 이상 입력하세요
                    </textarea>
                </td>
            </tr>

            <tr>
                <td>사진첨부</td>
                <td>
                    <input type="file" name="ifile" />
                </td>
            </tr>

            <tr>
                <td colspan = "2">
                <input type="submit" value="가입신청" align = "center" />
                </td>
            </tr>
        </form>
        </table>
    </body>
</html>
